<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Submitted</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; }
        .success-card { border: none; border-radius: 24px; }
        .check-icon { font-size: 4rem; color: #198754; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 text-center">
            
            <div class="card success-card shadow-sm p-5">
                <div class="mb-4">
                    <i class="bi bi-check-circle-fill check-icon"></i>
                </div>
                
                <h2 class="fw-bold mb-3">Request Received</h2>
                <p class="text-muted mb-4">
                    Your withdrawal request has been successfully submitted. Our team is currently reviewing the transaction.
                </p>

                <div class="bg-light p-3 rounded-4 mb-4 text-start">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted small">Timeline:</span>
                        <span class="fw-bold small">12-24 Hours</span>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span class="text-muted small">Status:</span>
                        <span class="badge bg-warning-subtle text-warning rounded-pill px-3">Pending Review</span>
                    </div>
                </div>

                <a href="{% url 'transaction_history' %}" class="btn btn-dark w-100 py-3 fw-bold rounded-3 mb-2">
                    View Transaction History
                </a>
                <a href="{% url 'dashboard' %}" class="btn btn-link text-decoration-none text-muted small">
                    Return to Dashboard
                </a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
